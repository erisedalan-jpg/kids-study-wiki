# 真题流水线配置（v2）
# 控制：PDF 文件名 → 卷别/文理归一化、tag 池过滤
# 复用 v1 设计，无 schema 变化

paper_aliases:
  # 按长度从长到短排序，保证 "新课标Ⅱ卷" 命中 "新课标Ⅱ" 而非 "新课标"
  - ["新课标Ⅱ卷", "新课标Ⅱ"]
  - ["新课标Ⅰ卷", "新课标Ⅰ"]
  - ["全国乙卷",   "全国乙"]
  - ["全国甲卷",   "全国甲"]
  - ["新课标Ⅱ",   "新课标Ⅱ"]   # 2013-2020 文件名无"卷"字
  - ["新课标Ⅰ",   "新课标Ⅰ"]
  - ["全国卷Ⅱ",   "全国Ⅱ"]     # 2008-2009 早年命名
  - ["新课标",     "新课标"]     # 2010-2012 文件名无Ⅱ
  - ["北京卷",     "北京"]
  - ["上海卷",     "上海"]
  - ["辽宁",       "辽宁"]     # 2024 部分省份单独命卷

gender_aliases:
  - ["（文）", "文"]
  - ["（理）", "理"]
  - ["（文科）", "文"]
  - ["（理科）", "理"]

# tag 池过滤：哪些 tag 进入高频统计
tag_pool_filters:
  数学:
    序号范围: [1, 9999]  # 全部数学概念
    额外纳入:
      - 单调性
      - 立体几何
      - 解三角形
      - 二面角
      - 导数应用
