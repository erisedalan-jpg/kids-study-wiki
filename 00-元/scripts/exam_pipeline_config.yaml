# 真题流水线集中配置 —— 由所有 5 个脚本共享读取
# 修改后所有脚本下次运行自动生效

provinces:
  - 吉林
  - 北京
  - 黑龙江

subjects:
  - 数学
  - 语文
  - 英语
  - 物理
  - 化学
  - 生物
  - 历史
  - 政治
  - 地理

# 卷别归一：PDF 文件名子串 → 短简称（用于真题词条文件名）
# 顺序敏感：长 key 优先匹配（避免 "新课标Ⅱ" 被 "新课标" 抢匹配）
paper_aliases:
  - ["新课标Ⅱ卷", "新课标Ⅱ"]
  - ["新课标Ⅰ卷", "新课标Ⅰ"]
  - ["全国乙卷", "全国乙"]
  - ["全国甲卷", "全国甲"]
  - ["全国卷Ⅱ", "全国Ⅱ"]
  - ["全国卷Ⅰ", "全国Ⅰ"]
  - ["新课标Ⅱ", "新课标Ⅱ"]
  - ["新课标Ⅰ", "新课标Ⅰ"]
  - ["全国Ⅱ", "全国Ⅱ"]
  - ["新课标", "新课标"]
  - ["北京", "北京"]

# 文/理识别（PDF 文件名子串 → 文/理/不分）
gender_aliases:
  - ["（文）", "文"]
  - ["（理）", "理"]

# 题型识别正则（按学科）
question_patterns:
  数学:
    选择:
      - '^\s*(\d+)\s*[\.、]\s*[^\n]{10,}?[A-D]\s*[\.．、][^\n]+'
    填空:
      - '^\s*(\d+)\s*[\.、][^\n]+_{2,}'
    解答:
      - '^\s*(\d+)\s*[\.、]\s*\(本小题|^\s*(\d+)\s*[\.、][^\n]{0,20}（\s*\d+\s*分'

# tag 池过滤：仅参与"高频考点统计"的词条范围
tag_pool_filters:
  数学:
    序号范围: [265, 514]      # 高中数学
    额外纳入:                 # 初中关键概念（白名单内但序号 < 265，明确允许进统计）
      - 函数
      - 不等式
      - 三角函数
      - 数列
      - 向量
      - 导数
      - 概率
      - 统计
      - 立体几何
      - 解析几何
