# 词条权重配置（多段加权，配置驱动）
#
# 公式（高层）：
#   反链得分 = Σ (省份权重[省] × 文理权重[文理] 对每个真题反链)
#   来源得分 = 课标必考 × 系数 + 学习路径出现 × 系数 + alias 数 × 系数
#   weight  = (反链得分 + 来源得分) × 学段权重[学段]
#
# 切换模式：改某权重即可，全词条 breakdown 已存，重跑 compute_weight.py 即时刷新。
# 当前模式：吉林理科高中专攻。北京/湖南/文/初中/小学权重 = 0，保留位以备未来开启。

省份权重:
  吉林: 5.0
  黑龙江: 5.0       # PDF 同卷，与吉林等同
  北京: 0.0         # 保留位
  湖南: 0.0         # 保留位
  全国默认: 0.0     # 兜底（未识别省份的真题反链）

学段权重:
  小学: 0.0         # 保留位
  初中: 0.0         # 保留位
  高中: 1.0
  全龄: 0.0         # 词条 frontmatter 学段=[小学,初中,高中] 的取最大启用段
  高考: 1.0         # 真题词条本身（少数学科词条 学段=高考）

文理权重:
  理: 1.0
  不分: 1.0         # 数学英语 2024+ 新课标不分文理；其他不分学科默认
  文: 0.0           # 当前抛弃；未来 = 1.0 开放

来源权重:
  课标必考: 3.0     # 词条 frontmatter `状态` 含「核心 / 必考」（保留位，当前 0 命中）
  学习路径: 2.0     # 词条 stem 被 00-元/学习路径/<学段>/<学科>/*.md 引用
  alias收敛: 1.0    # frontmatter aliases 数量（减 bare-name 后）

# 计算配置
缩放系数: 1.0       # 最终 weight 乘此系数后 round 到整数
配置版本: "2026-05-20"
